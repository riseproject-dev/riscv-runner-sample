name: Hello RISC-V

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hello:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        runs-on: [ubuntu-24.04-riscv, ubuntu-24.04]
    steps:
      - run: echo "hello from $(uname -m)"

  debug:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        runs-on: [ubuntu-24.04-riscv, ubuntu-24.04, ubuntu-24.04-arm]
    env:
      GITHUB_CONTEXT: ${{ toJson(github) }}
      # RUNNER_CONTEXT: ${{ toJson(runner) }}
    steps:
      - run: ps aux --forest
      - run: cat /etc/hostname
      - run: printenv
      - run: dpkg --list
      - run: apt-mark showmanual
      - run: find /opt -maxdepth 5
      - run: find /home/runner -maxdepth 5
      - run: find /home/runner/actions-runner/cached/2.*.*/externals -maxdepth 3 || true
      - run: >-
          which
          mvn
          ant
          gradle
          java
          python3
          python
          gh
          kubectl
          ninja
          rustc
          rustup
          cargo
          go
      - run: >-
          which
          mvn
          ant
          gradle
          java
          python3
          python
          gh
          kubectl
          ninja
          rustc
          rustup
          cargo
          go
          | xargs realpath
      - run: >-
          which
          mvn
          ant
          gradle
          java
          python3
          python
          gh
          kubectl
          ninja
          rustc
          rustup
          cargo
          go
          | xargs realpath
          | xargs dpkg -S || true

  debug-container:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        runs-on: [ubuntu-24.04-riscv, ubuntu-24.04, ubuntu-24.04-arm]
    container: ubuntu:24.04
    env:
      GITHUB_CONTEXT: ${{ toJson(github) }}
      # RUNNER_CONTEXT: ${{ toJson(runner) }}
    steps:
      - run: printenv
      - run: dpkg --list
      - run: find /__e -maxdepth 3
      - name: Setup Python 3.12
        uses: riseproject-dev/setup-python@main
        with:
          python-version: 3.12
          mirror: ${{ matrix.runs-on == 'ubuntu-24.04-riscv' && 'https://raw.githubusercontent.com/riseproject-dev/python-versions/main' || '' }}

  setup-python:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        runs-on: [ubuntu-24.04-riscv, ubuntu-24.04]
        python-version:
          - "3.14.2"
          - "3.13.12"
          - "3.13.0-rc.3"
          - "3.12"
          - "3"
        freethreaded:
          - false
        include:
          - runs-on: ubuntu-24.04-riscv
            python-version: "3.14.2"
            freethreaded: true
          - runs-on: ubuntu-24.04-riscv
            python-version: "3.14.2"
            freethreaded: false
          - runs-on: ubuntu-24.04
            python-version: "3.14.2"
            freethreaded: true
          - runs-on: ubuntu-24.04
            python-version: "3.14.2"
            freethreaded: false
    steps:
      - name: Setup Python ${{ matrix.python-version }}
        uses: riseproject-dev/setup-python@main
        with:
          python-version: ${{ matrix.python-version }}
          freethreaded: ${{ matrix.freethreaded || false }}
          mirror: ${{ matrix.runs-on == 'ubuntu-24.04-riscv' && 'https://raw.githubusercontent.com/riseproject-dev/python-versions/main' || '' }}

      - run: python --version

  sccache:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        runs-on: [ubuntu-24.04-riscv]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure sccache
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            core.exportVariable('SCCACHE_GHA_ENABLED', 'on');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
            core.exportVariable('ACTIONS_CACHE_SERVICE_V2', 'on'); // Force the github action v2

      - name: Build
        run: |
          set -eux -o pipefail
          which sccache
          sccache --version
          cd sccache-demo
          cmake -B build
          cmake --build build --verbose
          ./build/hello
          sccache --show-adv-stats
