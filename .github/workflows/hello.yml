name: Hello RISC-V

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-24.04-riscv
    steps:
      - run: echo "hello from $(uname -m)"

  setup-python:
    runs-on: ubuntu-24.04-riscv
    strategy:
      matrix:
        python-version:
          # - "3.14.2"
          # - "3.13.12"
          # - "3.12.0-rc.3"
          - "3.11.13"
    steps:
      - name: Setup Python ${{ matrix.python-version }}
        uses: riseproject-dev/setup-python@main
        with:
          python-version: ${{ matrix.python-version }}
          mirror: https://raw.githubusercontent.com/riseproject-dev/python-versions/main

      - run: python --version

  sccache:
    runs-on: ubuntu-24.04-riscv
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure sccache
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            core.exportVariable('SCCACHE_GHA_ENABLED', 'on');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
            core.exportVariable('ACTIONS_CACHE_SERVICE_V2', 'on'); // Force the github action v2

      - name: Build
        run: |
          set -eux -o pipefail
          which sccache
          sccache --version
          cd sccache-demo
          cmake -B build
          cmake --build build --verbose
          ./build/hello
          sccache --show-adv-stats
